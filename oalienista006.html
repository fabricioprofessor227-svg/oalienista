<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>O Alienista · Capítulo VI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Verdana', 'Arial', sans-serif;
            background: #f5f7f6;
            color: #1a2e2a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .reader-wrapper {
            width: 100%;
            max-width: 85%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04);
            padding: 20px 30px;
            border: 1px solid #dde5e0;
        }
        .page-header { margin-bottom: 12px; }
        .page-header h1 { font-size: 1.7rem; font-weight: 700; color: #0f3d2e; line-height: 1.2; margin-bottom: 6px; }
        .progress-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; font-weight: 600; color: #1a5e44; margin-bottom: 6px; }
        .progress-bar-bg { background: #dee6e1; height: 7px; border-radius: 20px; overflow: hidden; }
        .progress-fill { background: #1a7a58; height: 7px; width: 0%; border-radius: 20px; transition: width 0.2s; }
        .text-content {
            text-align: justify;
            padding: 8px 0 16px;
            max-height: 58vh;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.5;
        }
        .text-content p { margin-bottom: 1em; }
        .toolbar-single {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 6px;
            margin: 18px 0 14px;
            overflow-x: auto;
            padding: 4px 0 8px;
        }
        .tool-btn {
            background: #ecf3ef;
            border: 1px solid #b3cdbf;
            color: #134531;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 12px 14px;
            border-radius: 48px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tool-btn.small {
            min-width: 58px;
            padding: 12px 8px;
        }
        .tool-btn:active { background: #d0e0d7; transform: scale(0.96); }
        .tool-btn:disabled { opacity: 0.4; background: #e0e8e3; pointer-events: none; }

        .btn-index-small {
            background: none;
            border: 1px solid #a2bfb1;
            color: #1a5e44;
            padding: 8px 12px;
            font-size: 0.9rem;
            font-weight: normal;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 8px;
            width: auto;
            display: inline-block;
            transition: 0.1s;
        }
        .btn-index-small:active {
            background: #e6f0ea;
        }
        .index-wrapper {
            text-align: right;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="reader-wrapper">
    <div class="page-header">
        <h1>O Alienista · Capítulo VI</h1>
        <div class="progress-row">
            <span id="pageIndicator">Página 19</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
    </div>
    <div class="text-content" id="pageContent"></div>
    <div class="toolbar-single">
        <button class="tool-btn" id="fontMinusBtn">A−</button>
        <button class="tool-btn" id="fontPlusBtn">A+</button>
        <button class="tool-btn" id="rateBtn">1x</button>
        <button class="tool-btn" id="fullscreenBtn">⛶</button>
        <button class="tool-btn" id="speakBtn">🔊 Ouvir</button>
        <button class="tool-btn" id="prevBtnInline">◀</button>
        <button class="tool-btn" id="nextBtnInline">▶</button>
    </div>
    <div class="index-wrapper" id="indexWrapper" style="display: none;">
        <button id="backToIndexBtn" class="btn-index-small">📖 Voltar ao Índice</button>
    </div>
</div>

<script>
    (function(){
        // CONTEÚDO DO CAPÍTULO VI (DIVIDIDO EM 3 PÁGINAS)
        const pageContents = [
            // Página 1 (global 19)
            `<p><strong>CAPÍTULO VI - A REBELIÃO</strong></p>
            <p>Cerca de trinta pessoas ligaram-se ao barbeiro, redigiram e levaram uma representação à Câmara.</p>
            <p>A Câmara recusou aceitá-la, declarando que a Casa Verde era uma instituição pública, e que a ciência não podia ser emendada por votação administrativa, menos ainda por movimentos de rua.</p>
            <p>—Voltai ao trabalho, concluiu o presidente, é o conselho que vos damos.</p>
            <p>A irritação dos agitadores foi enorme. O barbeiro declarou que iam dali levantar a bandeira da rebelião e destruir a Casa Verde; que Itaguaí não podia continuar a servir de cadáver aos estudos e experiências de um déspota; que muitas pessoas estimáveis e algumas distintas, outras humildes mas dignas de apreço, jaziam nos cubículos da Casa Verde; que o despotismo científico do alienista complicava-se do espírito de ganância, visto que os loucos ou supostos tais não eram tratados de graça: as famílias e em falta delas a Câmara pagavam ao alienista...</p>
            <p>—É falso! interrompeu o presidente.</p>
            <p>—Falso?</p>
            <p>—Há cerca de duas semanas recebemos um ofício do ilustre médico em que nos declara que, tratando de fazer experiências de alto valor psicológico, desiste do estipêndio votado pela Câmara, bem como nada receberá das famílias dos enfermos.</p>
            <p>A notícia deste ato tão nobre, tão puro, suspendeu um pouco a alma dos rebeldes. Seguramente o alienista podia estar em erro, mas nenhum interesse alheio à ciência o instigava; e para demonstrar o erro, era preciso alguma coisa mais do que arruaças e clamores. Isto disse o presidente, com aplauso de toda a Câmara. O barbeiro, depois de alguns instantes de concentração, declarou que estava investido de um mandato público e não restituiria a paz a Itaguaí antes de ver por terra a Casa Verde — "essa Bastilha da razão humana" — expressão que ouvira a um poeta local e que ele repetiu com muita ênfase. Disse, e, a um sinal, todos saíram com ele.</p>`,
            
            // Página 2 (global 20)
            `<p>Imagine-se a situação dos vereadores; urgia obstar ao ajuntamento, à rebelião, à luta, ao sangue. Para acrescentar ao mal um dos vereadores que apoiara o presidente ouvindo agora a denominação dada pelo barbeiro à Casa Verde — "Bastilha da razão humana" — achou-a tão elegante que mudou de parecer. Disse que entendia de bom aviso decretar alguma medida que reduzisse a Casa Verde; e porque o presidente, indignado, manifestasse em termos enérgicos o seu pasmo, o vereador fez esta reflexão:</p>
            <p>—Nada tenho que ver com a ciência; mas, se tantos homens em quem supomos são reclusos por dementes, quem nos afirma que o alienado não é o alienista?</p>
            <p>Sebastião Freitas, o vereador dissidente, tinha o dom da palavra e falou ainda por algum tempo, com prudência mas com firmeza. Os colegas estavam atônitos; o presidente pediu-lhe que, ao menos, desse o exemplo da ordem e do respeito à lei, não aventasse as suas idéias na rua para não dar corpo e alma à rebelião, que era por ora um turbilhão de átomos dispersos. Esta figura corrigiu um pouco o efeito da outra: Sebastião Freitas prometeu suspender qualquer ação, reservando-se o direito de pedir pelos meios legais a redução da Casa Verde. E repetia consigo namorado: —Bastilha da razão humana!</p>
            <p>Entretanto a arruaça crescia. Já não eram trinta mas trezentas pessoas que acompanhavam o barbeiro, cuja alcunha familiar deve ser mencionada, porque ela deu o nome à revolta; chamavam-lhe o Canjica — e o movimento ficou célebre com o nome de revolta dos Canjicas. A ação podia ser restrita — visto que muita gente, ou por medo, ou por hábitos de educação, não descia à rua; mas o sentimento era unânime, ou quase unânime, e os trezentos que caminhavam para a Casa Verde, — dada a diferença de Paris a Itaguaí, — podiam ser comparados aos que tomaram a Bastilha.</p>
            <p>D. Evarista teve notícia da rebelião antes que ela chegasse; veio dar-lha uma de suas crias. Ela provava nessa ocasião um vestido de seda, — um dos trinta e sete que trouxera do Rio de Janeiro, — e não quis crer.</p>`,
            
            // Página 3 (global 21)
            `<p>—Há de ser alguma patuscada, dizia ela, mudando a posição de um alfinete. Benedita, vê se a barra está boa.</p>
            <p>—Está, sinhá, respondia a mucama de cócoras no chão, está boa. Sinhá vira um bocadinho. Assim. Está muito boa.</p>
            <p>—Não é patuscada, não, senhora; eles estão gritando: — Morra o Dr. Bacamarte!!! o tirano! dizia o moleque assustado.</p>
            <p>—Cala a boca, tolo! Benedita, olha aí do lado esquerdo; não parece que a costura está um pouco enviesada? A risca azul não segue até abaixo; está muito feio assim; é preciso descoser para ficar igualzinho e...</p>
            <p>— Morra o Dr. Bacamarte!!! morra o tirano! uivaram fora trezentas vozes. Era a rebelião que desembocava na Rua Nova.</p>
            <p>D. Evarista ficou sem pinga de sangue. No primeiro instante não deu um passo, não fez um gesto; o terror petrificou-a. A mucama correu instintivamente para a porta do fundo. Quanto ao moleque, a quem D. Evarista não dera crédito, teve um instante de triunfo súbito, imperceptível, entranhado, de satisfação moral, ao ver que a realidade vinha jurar por ele.</p>
            <p>—Morra o alienista! bradavam as vozes mais perto.</p>
            <p>D. Evarista, se não resistia facilmente às comoções de prazer, sabia entestar com os momentos de perigo. Não desmaiou; correu à sala interior onde o marido estudava. Quando ela ali entrou, precipitada, o ilustre médico escrutava um texto de Averróis; os olhos dele, empanados pela cogitação, subiam do livro ao teto e baixavam do teto ao livro, cegos para a realidade exterior, videntes para os profundos trabalhos mentais. D. Evarista chamou pelo marido duas vezes, sem que ele lhe desse atenção; à terceira, ouviu e perguntou-lhe o que tinha, se estava doente.</p>
            <p>—Você não ouve estes gritos? perguntou a digna esposa em lágrimas.</p>
            <p>O alienista atendeu então; os gritos aproximavam-se, terríveis, ameaçadores; ele compreendeu tudo. Levantou-se da cadeira de espaldar em que estava sentado, fechou o livro, e, a passo firme e tranqüilo, foi depositá-lo na estante. Como a introdução do volume desconsertasse um pouco a linha dos dois tomos contíguos, Simão Bacamarte cuidou de corrigir esse defeito mínimo, e, aliás, interessante. Depois disse à mulher que se recolhesse, que não fizesse nada.</p>
            <p>—Não, não, implorava a digna senhora, quero morrer ao lado de você...</p>
            <p>Simão Bacamarte teimou que não, que não era caso de morte; e ainda que o fosse, intimava-lhe, em nome da vida, que ficasse. A infeliz dama curvou a cabeça, obediente e chorosa.</p>
            <p>—Abaixo a Casa Verde! bradavam os Canjicas.</p>`
        ];

        const startPage = 19;          // Primeira página deste capítulo (global)
        let currentPage = 0;
        const totalPages = pageContents.length;
        let fontSizeIndex = 2;
        const fontSizes = [16, 26, 36, 48, 56];
        
        let rateIndex = 0;
        const rates = [1, 1.3, 1.5];
        
        let utterance = null;
        let speaking = false;

        // DOM
        const pageIndicator = document.getElementById('pageIndicator');
        const pageContent = document.getElementById('pageContent');
        const progressFill = document.getElementById('progressFill');
        const fontMinus = document.getElementById('fontMinusBtn');
        const fontPlus = document.getElementById('fontPlusBtn');
        const rateBtn = document.getElementById('rateBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const speakBtn = document.getElementById('speakBtn');
        const prevBtn = document.getElementById('prevBtnInline');
        const nextBtn = document.getElementById('nextBtnInline');
        const indexWrapper = document.getElementById('indexWrapper');
        const backToIndexBtn = document.getElementById('backToIndexBtn');

        function stopSpeaking() {
            if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
                window.speechSynthesis.cancel();
            }
            speaking = false;
        }

        function speakPage() {
            stopSpeaking();
            const text = pageContent.innerText;
            utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(v => v.lang === 'pt-BR') || voices[0];
            utterance.rate = rates[rateIndex];
            utterance.onend = () => { speaking = false; };
            window.speechSynthesis.speak(utterance);
            speaking = true;
        }

        function updateUI() {
            pageContent.innerHTML = pageContents[currentPage];
            const globalPage = startPage + currentPage;
            pageIndicator.textContent = `Página ${globalPage}`;
            const percent = ((currentPage+1) / totalPages) * 100;
            progressFill.style.width = percent + '%';
            
            if (currentPage === totalPages-1) {
                indexWrapper.style.display = 'block';
            } else {
                indexWrapper.style.display = 'none';
            }
            applyFontSize();
        }

        function applyFontSize() {
            pageContent.style.fontSize = fontSizes[fontSizeIndex] + 'px';
        }

        function goToPage(delta) {
            let newPage = currentPage + delta;
            if (newPage < 0) {
                window.location.href = 'oalienista005.html';
                return;
            }
            if (newPage >= totalPages) {
                window.location.href = 'oalienista007.html';
                return;
            }
            stopSpeaking();
            currentPage = newPage;
            updateUI();
        }

        function cycleRate() {
            rateIndex = (rateIndex + 1) % rates.length;
            const rateValue = rates[rateIndex];
            rateBtn.textContent = rateValue === 1 ? '1x' : (rateValue === 1.3 ? '1.3x' : '1.5x');
            if (speaking) speakPage();
        }

        prevBtn.addEventListener('click', () => goToPage(-1));
        nextBtn.addEventListener('click', () => goToPage(1));
        backToIndexBtn.addEventListener('click', () => { window.location.href = 'indice.html'; });
        fontMinus.addEventListener('click', () => { if (fontSizeIndex > 0) fontSizeIndex--; applyFontSize(); });
        fontPlus.addEventListener('click', () => { if (fontSizeIndex < fontSizes.length-1) fontSizeIndex++; applyFontSize(); });
        fullscreenBtn.addEventListener('click', () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); });
        speakBtn.addEventListener('click', () => { if (speaking) stopSpeaking(); else speakPage(); });
        rateBtn.addEventListener('click', cycleRate);

        cycleRate();
        updateUI();
    })();
</script>
</body>
</html>
