<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>O Alienista · Capítulo IV</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Verdana', 'Arial', sans-serif;
            background: #f5f7f6;
            color: #1a2e2a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .reader-wrapper {
            width: 100%;
            max-width: 85%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04);
            padding: 20px 30px;
            border: 1px solid #dde5e0;
        }
        .page-header { margin-bottom: 12px; }
        .page-header h1 { font-size: 1.7rem; font-weight: 700; color: #0f3d2e; line-height: 1.2; margin-bottom: 6px; }
        .progress-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; font-weight: 600; color: #1a5e44; margin-bottom: 6px; }
        .progress-bar-bg { background: #dee6e1; height: 7px; border-radius: 20px; overflow: hidden; }
        .progress-fill { background: #1a7a58; height: 7px; width: 0%; border-radius: 20px; transition: width 0.2s; }
        .text-content {
            text-align: justify;
            padding: 8px 0 16px;
            max-height: 58vh;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.5;
        }
        .text-content p { margin-bottom: 1em; }
        .toolbar-single {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 6px;
            margin: 18px 0 14px;
            overflow-x: auto;
            padding: 4px 0 8px;
        }
        .tool-btn {
            background: #ecf3ef;
            border: 1px solid #b3cdbf;
            color: #134531;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 12px 14px;
            border-radius: 48px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tool-btn:active { background: #d0e0d7; transform: scale(0.96); }
        .tool-btn:disabled { opacity: 0.4; background: #e0e8e3; pointer-events: none; }

        .btn-index-small {
            background: none;
            border: 1px solid #a2bfb1;
            color: #1a5e44;
            padding: 8px 12px;
            font-size: 0.9rem;
            font-weight: normal;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 8px;
            width: auto;
            display: inline-block;
            transition: 0.1s;
        }
        .btn-index-small:active {
            background: #e6f0ea;
        }
        .index-wrapper {
            text-align: right;
            margin-top: 5px;
        }

        /* Estilos do Easter Egg */
        .easter-egg-box {
            background: #fef7e0;
            border-left: 5px solid #e6a017;
            border-radius: 16px;
            padding: 16px;
            margin: 20px 0 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }
        .easter-egg-text {
            flex: 3;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .easter-egg-text p {
            margin-bottom: 12px;
        }
        .easter-egg-img {
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        .easter-egg-img img {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .easter-btn {
            background: #e6a017;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            margin-top: 8px;
        }
        .easter-btn:hover {
            background: #c4880f;
            transform: scale(1.02);
        }
        @media (max-width: 600px) {
            .easter-egg-box {
                flex-direction: column;
                text-align: center;
            }
            .easter-egg-img {
                order: -1;
            }
        }
    </style>
</head>
<body>
<div class="reader-wrapper">
    <div class="page-header">
        <h1>O Alienista · Capítulo IV</h1>
        <div class="progress-row">
            <span id="pageIndicator">Página 11</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
    </div>
    <div class="text-content" id="pageContent"></div>
    <div class="toolbar-single">
        <button class="tool-btn" id="fontMinusBtn">A−</button>
        <button class="tool-btn" id="fontPlusBtn">A+</button>
        <button class="tool-btn" id="rateBtn">1x</button>
        <button class="tool-btn" id="fullscreenBtn">⛶</button>
        <button class="tool-btn" id="speakBtn">🔊 Ouvir</button>
        <button class="tool-btn" id="prevBtnInline">◀</button>
        <button class="tool-btn" id="nextBtnInline">▶</button>
    </div>
    <div class="index-wrapper" id="indexWrapper" style="display: none;">
        <button id="backToIndexBtn" class="btn-index-small">📖 Voltar ao Índice</button>
    </div>
</div>

<script>
    (function(){
        // Conteúdo do Capítulo IV (4 páginas)
        const pageContents = [
            // Página 1 (global 11)
            `<p><strong>CAPÍTULO IV - UMA TEORIA NOVA</strong></p>
            <p>Ao passo que D. Evarista, em lágrimas, vinha buscando o Rio de Janeiro, Simão Bacamarte estudava por todos os lados uma certa idéia arrojada e nova, própria a alargar as bases da psicologia. Todo o tempo que lhe sobrava dos cuidados da Casa Verde, era pouco para andar na rua, ou de casa em casa, conversando as gentes, sobre trinta mil assuntos, e virgulando as falas de um olhar que metia medo aos mais heróicos.</p>
            <p>Um dia de manhã — eram passadas três semanas —, estando Crispim Soares ocupado em temperar um medicamento, vieram dizer-lhe que o alienista o mandava chamar.</p>
            <p>—Trata-se de negócio importante, segundo ele me disse, acrescentou o portador.</p>
            <p>Crispim empalideceu. Que negócio importante podia ser, se não alguma notícia da comitiva, e especialmente da mulher? Crispim amava a mulher, e nunca estiveram separados um só dia. Assim se explicam os monólogos que ele fazia agora. Tão depressa recebeu o recado como voou à Casa Verde.</p>
            <p>Simão Bacamarte recebeu-o com a alegria própria de um sábio.</p>
            <p>—Estou muito contente, disse ele.</p>
            <p>—Notícias do nosso povo? perguntou o boticário.</p>
            <p>O alienista fez um gesto magnífico, e respondeu:</p>
            <p>—Trata-se de uma experiência científica. A loucura, objeto dos meus estudos, era até agora uma ilha perdida no oceano da razão; começo a suspeitar que é um continente.</p>
            <p>Disse isto, e explicou sua idéia: a insânia abrangia uma vasta superfície de cérebros.</p>`,
            
            // Página 2 (global 12)
            `<p>Os exemplos achou-os na história e em Itaguaí. Apontou Sócrates (com seu demônio familiar), Pascal (que via um abismo à esquerda), Maomé, Caracala, Domiciano, Calígula. E porque o boticário se admirasse da promiscuidade, o alienista disse-lhe que era tudo a mesma coisa:</p>
            <p>—A ferocidade, Sr. Soares, é o grotesco a sério.</p>
            <p>—Gracioso, muito gracioso! exclamou Crispim.</p>
            <p>Quanto à idéia de ampliar o território da loucura, achou-a extravagante, mas declarou-a sublime, dizendo que era "caso de matraca".</p>
            <p>Naquele tempo, Itaguaí não dispunha de imprensa; tinha dois modos de divulgar uma notícia: cartazes manuscritos ou matraca. Contratava-se um homem para andar com uma matraca pelas ruas; tocava-a, reunia gente e anunciava o que lhe incumbiam. O sistema tinha inconvenientes, mas era conservado pela grande energia de divulgação. Assim, um vereador que se opusera à Casa Verde desfrutava a reputação de educador de cobras e macacos, sem nunca ter domesticado um; mas fazia trabalhar a matraca todos os meses.</p>`,
            
            // Página 3 (global 13)
            `<p>—Há melhor do que anunciar a minha idéia, é praticá-la, respondeu o alienista.</p>
            <p>—Sempre haverá tempo de a dar à matraca, concluiu o boticário.</p>
            <p>Simão Bacamarte refletiu e disse:</p>
            <p>—Suponho o espírito humano uma vasta concha; meu fim é extrair a pérola, que é a razão. Demarquemos os limites da razão e da loucura. A razão é o perfeito equilíbrio de todas as faculdades; fora daí, insânia.</p>
            <p>O Vigário Lopes, a quem ele confiou a nova teoria, declarou que era absurda, ou se não absurda, colossal demais para ser executada.</p>
            <p>—Com a definição atual, a loucura e a razão estão perfeitamente delimitadas. Para que transpor a cerca?</p>
            <p>Sobre o lábio do alienista rogou a vaga sombra de uma intenção de riso, mas nenhuma palavra saiu. A ciência estendeu a mão à teologia com tal segurança, que a teologia não soube se devia crer em si ou na outra. Itaguaí e o universo ficavam à beira de uma revolução.</p>`,
            
            // Página 4 (global 14) – EASTER EGG
            `<p>Assim, com a alma cheia de conceitos novos e audaciosos, o alienista preparava-se para abalar os fundamentos da psicologia. O boticário, atônito, mal ousava crer no que ouvia, mas repetia consigo as frases do mestre, guardando-as no coração. A teoria de Simão Bacamarte, se não era aceita prontamente, ao menos começava a rondar as conversas da vila, provocando espanto e admiração. Uns a julgavam loucura; outros, obra de gênio. Ele, porém, impassível, continuava a pensar nos meios de experimentá-la, certo de que a verdade viria a lume, mais cedo ou mais tarde.</p>
            <p>E foi assim que, entre o pasmo de alguns e a incredulidade de muitos, a Casa Verde e seu criador avançaram mais um passo na estrada que haveria de transformar a compreensão do espírito humano em Itaguaí — e, quem sabe, no mundo.</p>
            
            <div class="easter-egg-box">
                <div class="easter-egg-text">
                    <p>📺 <strong>Você encontrou um conteúdo extra!</strong> O 'Caso Especial O Alienista' da Rede Globo (1993) é uma maravilhosa adaptação livre do livro que você está lendo.</p>
                    <p>Clicando aqui, você vai abrir o vídeo em uma nova aba. Deixe o vídeo lá, termine de ler o livro primeiro e depois aprecie esta joia da TV brasileira, com um elenco que dispensa apresentações. Tenho certeza de que você vai gostar muito.</p>
                    <button class="easter-btn" id="easterEggBtn">🎬 Assista ao vídeo ➤</button>
                </div>
                <div class="easter-egg-img">
                    <img src="https://s2-memoriaglobo.glbimg.com/7jDnuXWXPJXow539oonIFrGf5wU=/0x0:1230x1926/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_ee6202d7f3f346a7a5d7affb807d8893/internal_photos/bs/2024/v/4/x0vXq7TeKX5hdBUbCxMg/o-alienista-marco-nanini-i0000085.jpg" alt="Caso Especial O Alienista">
                </div>
            </div>`
        ];

        const startPage = 11;          // primeira página deste capítulo
        const totalPages = pageContents.length;
        let currentPage = 0;
        let fontSizeIndex = 2;
        const fontSizes = [16, 26, 36, 48, 56];
        
        let rateIndex = 0;
        const rates = [1, 1.3, 1.5];
        
        let utterance = null;
        let speaking = false;

        // DOM
        const pageIndicator = document.getElementById('pageIndicator');
        const pageContent = document.getElementById('pageContent');
        const progressFill = document.getElementById('progressFill');
        const fontMinus = document.getElementById('fontMinusBtn');
        const fontPlus = document.getElementById('fontPlusBtn');
        const rateBtn = document.getElementById('rateBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const speakBtn = document.getElementById('speakBtn');
        const prevBtn = document.getElementById('prevBtnInline');
        const nextBtn = document.getElementById('nextBtnInline');
        const indexWrapper = document.getElementById('indexWrapper');
        const backToIndexBtn = document.getElementById('backToIndexBtn');

        function stopSpeaking() {
            if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
                window.speechSynthesis.cancel();
            }
            speaking = false;
        }

        function speakPage() {
            stopSpeaking();
            const text = pageContent.innerText;
            utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(v => v.lang === 'pt-BR') || voices[0];
            utterance.rate = rates[rateIndex];
            utterance.onend = () => { speaking = false; };
            window.speechSynthesis.speak(utterance);
            speaking = true;
        }

        function updateUI() {
            pageContent.innerHTML = pageContents[currentPage];
            const globalPage = startPage + currentPage;
            pageIndicator.textContent = `Página ${globalPage}`;
            const percent = ((currentPage+1) / totalPages) * 100;
            progressFill.style.width = percent + '%';
            
            if (currentPage === totalPages-1) {
                indexWrapper.style.display = 'block';
                // Adiciona evento do Easter Egg após a página ser carregada
                const easterBtn = document.getElementById('easterEggBtn');
                if (easterBtn) {
                    easterBtn.addEventListener('click', function() {
                        window.open('https://www.youtube.com/watch?v=Cu7QifQPrgc', '_blank');
                    });
                }
            } else {
                indexWrapper.style.display = 'none';
            }
            applyFontSize();
        }

        function applyFontSize() {
            pageContent.style.fontSize = fontSizes[fontSizeIndex] + 'px';
        }

        function goToPage(delta) {
            let newPage = currentPage + delta;
            if (newPage < 0) {
                window.location.href = 'oalienista003.html';
                return;
            }
            if (newPage >= totalPages) {
                window.location.href = 'oalienista005.html';
                return;
            }
            stopSpeaking();
            currentPage = newPage;
            updateUI();
        }

        function cycleRate() {
            rateIndex = (rateIndex + 1) % rates.length;
            const rateValue = rates[rateIndex];
            rateBtn.textContent = rateValue === 1 ? '1x' : (rateValue === 1.3 ? '1.3x' : '1.5x');
            if (speaking) speakPage();
        }

        prevBtn.addEventListener('click', () => goToPage(-1));
        nextBtn.addEventListener('click', () => goToPage(1));
        backToIndexBtn.addEventListener('click', () => { window.location.href = 'indice.html'; });
        fontMinus.addEventListener('click', () => { if (fontSizeIndex > 0) fontSizeIndex--; applyFontSize(); });
        fontPlus.addEventListener('click', () => { if (fontSizeIndex < fontSizes.length-1) fontSizeIndex++; applyFontSize(); });
        fullscreenBtn.addEventListener('click', () => { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); });
        speakBtn.addEventListener('click', () => { if (speaking) stopSpeaking(); else speakPage(); });
        rateBtn.addEventListener('click', cycleRate);

        cycleRate();
        updateUI();
    })();
</script>
</body>
</html>
