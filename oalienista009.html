<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>O Alienista · Capítulo IX</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Verdana', 'Arial', sans-serif;
            background: #f5f7f6;
            color: #1a2e2a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .reader-wrapper {
            width: 100%;
            max-width: 85%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04);
            padding: 20px 30px;
            border: 1px solid #dde5e0;
        }
        .page-header { margin-bottom: 12px; }
        .page-header h1 { font-size: 1.7rem; font-weight: 700; color: #0f3d2e; line-height: 1.2; margin-bottom: 6px; }
        .progress-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; font-weight: 600; color: #1a5e44; margin-bottom: 6px; }
        .progress-bar-bg { background: #dee6e1; height: 7px; border-radius: 20px; overflow: hidden; }
        .progress-fill { background: #1a7a58; height: 7px; width: 0%; border-radius: 20px; transition: width 0.2s; }
        .text-content {
            text-align: justify;
            padding: 8px 0 16px;
            max-height: 58vh;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.5;
        }
        .text-content p { margin-bottom: 1em; }
        .toolbar-single {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 6px;
            margin: 18px 0 14px;
            overflow-x: auto;
            padding: 4px 0 8px;
        }
        .tool-btn {
            background: #ecf3ef;
            border: 1px solid #b3cdbf;
            color: #134531;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 12px 14px;
            border-radius: 48px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tool-btn.small {
            min-width: 58px;
            padding: 12px 8px;
        }
        .tool-btn:active { background: #d0e0d7; transform: scale(0.96); }
        .tool-btn:disabled { opacity: 0.4; background: #e0e8e3; pointer-events: none; }

        .btn-index-small {
            background: none;
            border: 1px solid #a2bfb1;
            color: #1a5e44;
            padding: 8px 12px;
            font-size: 0.9rem;
            font-weight: normal;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 8px;
            width: auto;
            display: inline-block;
            transition: 0.1s;
        }
        .btn-index-small:active {
            background: #e6f0ea;
        }
        .index-wrapper {
            text-align: right;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="reader-wrapper">
    <div class="page-header">
        <h1>O Alienista · Capítulo IX</h1>
        <div class="progress-row">
            <span id="pageIndicator">Página 28</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
    </div>
    <div class="text-content" id="pageContent"></div>
    <div class="toolbar-single">
        <button class="tool-btn" id="fontMinusBtn">A−</button>
        <button class="tool-btn" id="fontPlusBtn">A+</button>
        <button class="tool-btn" id="rateBtn">1x</button>
        <button class="tool-btn" id="fullscreenBtn">⛶</button>
        <button class="tool-btn" id="speakBtn">🔊 Ouvir</button>
        <button class="tool-btn" id="prevBtnInline">◀</button>
        <button class="tool-btn" id="nextBtnInline">▶</button>
    </div>
    <div class="index-wrapper" id="indexWrapper" style="display: none;">
        <button id="backToIndexBtn" class="btn-index-small">📖 Voltar ao Índice</button>
    </div>
</div>

<script>
    (function(){
        // CONTEÚDO DO CAPÍTULO IX (DIVIDIDO EM 2 PÁGINAS)
        const pageContents = [
            // Página 1 (global 28)
            `<p><strong>CAPÍTULO IX - DOIS LINDOS CASOS</strong></p>
            <p>Não se demorou o alienista em receber o barbeiro; declarou-lhe que não tinha meios de resistir, e portanto estava prestes a obedecer. Só uma coisa pedia, é que o não constrangesse a assistir pessoalmente à destruição da Casa Verde.</p>
            <p>— Engana-se Vossa Senhoria, disse o barbeiro depois de alguma pausa, engana-se em atribuir ao governo intenções vandálicas. Com razão ou sem ela, a opinião crê que a maior parte dos doidos ali metidos estão em seu perfeito juízo, mas o governo reconhece que a questão é puramente científica e não cogita em resolver com posturas as questões científicas. Demais, a Casa Verde é uma instituição pública; tal a aceitamos das mãos da Câmara dissolvida. Há entretanto — por força que há de haver um alvitre intermédio que restitua o sossego ao espírito público.</p>
            <p>O alienista mal podia dissimular o assombro; confessou que esperava outra coisa, o arrasamento do hospício, a prisão dele, o desterro, tudo, menos...</p>
            <p>—O pasmo de Vossa Senhoria, atalhou gravemente o barbeiro, vem de não atender à grave responsabilidade do governo. O povo, tomado de uma cega piedade que lhe dá em tal caso legítima indignação, pode exigir do governo certa ordem de atos; mas este, com a responsabilidade que lhe incumbe, não os deve praticar, ao menos integralmente, e tal é a nossa situação. A generosa revolução que ontem derrubou uma Câmara vilipendiada e corrupta, pediu em altos brados o arrasamento da Casa Verde; mas pode entrar no ânimo do governo eliminar a loucura? Não. E se o governo não a pode eliminar, está ao menos apto para discriminá-la, reconhecê-la? Também não; é matéria de ciência. Logo, em assunto tão melindroso, o governo não pode, não quer dispensar o concurso de Vossa Senhoria. O que lhe pede é que de certa maneira demos alguma satisfação ao povo. Unamo-nos, e o povo saberá obedecer. Um dos alvitres aceitáveis, se Vossa Senhoria não indicar outro, seria fazer retirar da Casa Verde aqueles enfermos que estiverem quase curados e bem assim os maníacos de pouca monta, etc. Desse modo, sem grande perigo, mostraremos alguma tolerância e benignidade.</p>
            <p>—Quantos mortos e feridos houve ontem no conflito? perguntou Simão Bacamarte depois de uns três minutos.</p>
            <p>O barbeiro ficou espantado da pergunta, mas respondeu logo que onze mortos e vinte e cinco feridos.</p>
            <p>—Onze mortos e vinte e cinco feridos! repetiu duas ou três vezes o alienista.</p>`,
            
            // Página 2 (global 29)
            `<p>E em seguida declarou que o alvitre lhe não parecia bom mas que ele ia catar algum outro, e dentro de poucos dias lhe daria resposta. E fez-lhe várias perguntas acerca dos sucessos da véspera, ataque, defesa, adesão dos dragões, resistência da Câmara etc., ao que o barbeiro ia respondendo com grande abundância, insistindo principalmente no descrédito em que a Câmara caíra. O barbeiro confessou que o novo governo não tinha ainda por si a confiança dos principais da vila, mas o alienista podia fazer muito nesse ponto. O governo, concluiu o barbeiro, folgaria se pudesse contar não já com a simpatia senão com a benevolência do mais alto espírito de Itaguaí e seguramente do reino. Mas nada disso alterava a nobre e austera fisionomia daquele grande homem que ouvia calado, sem desvanecimento nem modéstia, mas impassível como um deus de pedra.</p>
            <p>—Onze mortos e vinte e cinco feridos, repetiu o alienista depois de acompanhar o barbeiro até a porta. Eis aí dois lindos casos de doença cerebral. Os sintomas de duplicidade e descaramento deste barbeiro são positivos. Quanto à toleima dos que o aclamaram, não é preciso outra prova além dos onze mortos e vinte e cinco feridos. — Dois lindos casos!</p>
            <p>—Viva o ilustre Porfírio! bradaram umas trinta pessoas que aguardavam o barbeiro à porta.</p>
            <p>O alienista espiou pela janela e ainda ouviu este resto de uma pequena fala do barbeiro às trinta pessoas que o aclamavam:</p>
            <p>—...porque eu velo, podeis estar certos disso, eu velo pela execução das vontades do povo. Confiai em mim; e tudo se fará pela melhor maneira. Só vos recomendo ordem. E ordem, meus amigos, é a base do governo...</p>
            <p>—Viva o ilustre Porfírio! bradaram as trinta vozes, agitando os chapéus.</p>
            <p>—Dois lindos casos! murmurou o alienista.</p>`
        ];

        const startPage = 28;          // Primeira página deste capítulo (global)
        let currentPage = 0;
        const totalPages = pageContents.length;
        let fontSizeIndex = 2;
        const fontSizes = [16, 26, 36, 48, 56];
        
        let rateIndex = 0;
        const rates = [1, 1.3, 1.5];
        
        let utterance = null;
        let speaking = false;

        // DOM
        const pageIndicator = document.getElementById('pageIndicator');
        const pageContent = document.getElementById('pageContent');
        const progressFill = document.getElementById('progressFill');
        const fontMinus = document.getElementById('fontMinusBtn');
        const fontPlus = document.getElementById('fontPlusBtn');
        const rateBtn = document.getElementById('rateBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const speakBtn = document.getElementById('speakBtn');
        const prevBtn = document.getElementById('prevBtnInline');
        const nextBtn = document.getElementById('nextBtnInline');
        const indexWrapper = document.getElementById('indexWrapper');
        const backToIndexBtn = document.getElementById('backToIndexBtn');

        function stopSpeaking() {
            if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
                window.speechSynthesis.cancel();
            }
            speaking = false;
        }

        function speakPage() {
            stopSpeaking();
            const text = pageContent.innerText;
            utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(v => v.lang === 'pt-BR') || voices[0];
            utterance.rate = rates[rateIndex];
            utterance.onend = () => { speaking = false; };
            window.speechSynthesis.speak(utterance);
            speaking = true;
        }

        function updateUI() {
            pageContent.innerHTML = pageContents[currentPage];
            const globalPage = startPage + currentPage;
            pageIndicator.textContent = `Página ${globalPage}`;
            const percent = ((currentPage+1) / totalPages) * 100;
            progressFill.style.width = percent + '%';
            
            if (currentPage === totalPages-1) {
                indexWrapper.style.display = 'block';
            } else {
                indexWrapper.style.display = 'none';
            }
            applyFontSize();
        }

        function applyFontSize() {
            pageContent.style.fontSize = fontSizes[fontSizeIndex] + 'px';
        }

        function goToPage(delta) {
            let newPage = currentPage + delta;
            if (newPage < 0) {
                window.location.href = 'oalienista008.html';
                return;
            }
            if (newPage >= totalPages) {
                window.location.href = 'oalienista010.html';
                return;
            }
            stopSpeaking();
            currentPage = newPage;
            updateUI();
        }

        function cycleRate() {
            rateIndex = (rateIndex + 1) % rates.length;
            const rateValue = rates[rateIndex];
            rateBtn.textContent = rateValue === 1 ? '1x' : (rateValue === 1.3 ? '1.3x' : '1.5x');
            if (speaking) speakPage();
        }

        prevBtn.addEventListener('click', () => goToPage(-1));
        nextBtn.addEventListener('click', () => goToPage(1));
        backToIndexBtn.addEventListener('click', () => { window.location.href = 'indice.html'; });
        fontMinus.addEventListener('click', () => { if (fontSizeIndex > 0) fontSizeIndex--; applyFontSize(); });
        fontPlus.addEventListener('click', () => { if (fontSizeIndex < fontSizes.length-1) fontSizeIndex++; applyFontSize(); });
        fullscreenBtn.addEventListener('click', () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); });
        speakBtn.addEventListener('click', () => { if (speaking) stopSpeaking(); else speakPage(); });
        rateBtn.addEventListener('click', cycleRate);

        cycleRate();
        updateUI();
    })();
</script>
</body>
</html>
