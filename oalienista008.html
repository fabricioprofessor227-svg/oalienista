<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>O Alienista · Capítulo VIII</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Verdana', 'Arial', sans-serif;
            background: #f5f7f6;
            color: #1a2e2a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .reader-wrapper {
            width: 100%;
            max-width: 85%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04);
            padding: 20px 30px;
            border: 1px solid #dde5e0;
        }
        .page-header { margin-bottom: 12px; }
        .page-header h1 { font-size: 1.7rem; font-weight: 700; color: #0f3d2e; line-height: 1.2; margin-bottom: 6px; }
        .progress-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; font-weight: 600; color: #1a5e44; margin-bottom: 6px; }
        .progress-bar-bg { background: #dee6e1; height: 7px; border-radius: 20px; overflow: hidden; }
        .progress-fill { background: #1a7a58; height: 7px; width: 0%; border-radius: 20px; transition: width 0.2s; }
        .text-content {
            text-align: justify;
            padding: 8px 0 16px;
            max-height: 58vh;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.5;
        }
        .text-content p { margin-bottom: 1em; }
        .toolbar-single {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 6px;
            margin: 18px 0 14px;
            overflow-x: auto;
            padding: 4px 0 8px;
        }
        .tool-btn {
            background: #ecf3ef;
            border: 1px solid #b3cdbf;
            color: #134531;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 12px 14px;
            border-radius: 48px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tool-btn.small {
            min-width: 58px;
            padding: 12px 8px;
        }
        .tool-btn:active { background: #d0e0d7; transform: scale(0.96); }
        .tool-btn:disabled { opacity: 0.4; background: #e0e8e3; pointer-events: none; }

        .btn-index-small {
            background: none;
            border: 1px solid #a2bfb1;
            color: #1a5e44;
            padding: 8px 12px;
            font-size: 0.9rem;
            font-weight: normal;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 8px;
            width: auto;
            display: inline-block;
            transition: 0.1s;
        }
        .btn-index-small:active {
            background: #e6f0ea;
        }
        .index-wrapper {
            text-align: right;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="reader-wrapper">
    <div class="page-header">
        <h1>O Alienista · Capítulo VIII</h1>
        <div class="progress-row">
            <span id="pageIndicator">Página 26</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
    </div>
    <div class="text-content" id="pageContent"></div>
    <div class="toolbar-single">
        <button class="tool-btn" id="fontMinusBtn">A−</button>
        <button class="tool-btn" id="fontPlusBtn">A+</button>
        <button class="tool-btn" id="rateBtn">1x</button>
        <button class="tool-btn" id="fullscreenBtn">⛶</button>
        <button class="tool-btn" id="speakBtn">🔊 Ouvir</button>
        <button class="tool-btn" id="prevBtnInline">◀</button>
        <button class="tool-btn" id="nextBtnInline">▶</button>
    </div>
    <div class="index-wrapper" id="indexWrapper" style="display: none;">
        <button id="backToIndexBtn" class="btn-index-small">📖 Voltar ao Índice</button>
    </div>
</div>

<script>
    (function(){
        // CONTEÚDO DO CAPÍTULO VIII (DIVIDIDO EM 3 PÁGINAS)
        const pageContents = [
            // Página 1 (global 26)
            `<p><strong>CAPÍTULO VIII - AS ANGÚSTIAS DO BOTICÁRIO</strong></p>
            <p>Vinte e quatro horas depois dos sucessos narrados no capítulo anterior, o barbeiro saiu do palácio do governo, — foi a denominação dada à casa da Câmara, — com dois ajudantes-de-ordens, e dirigiu-se à residência de Simão Bacamarte. Não ignorava ele que era mais decoroso ao governo mandá-lo chamar; o receio, porém, de que o alienista não obedecesse, obrigou-o a parecer tolerante e moderado.</p>
            <p>Não descrevo o terror do boticário ao ouvir dizer que o barbeiro ia à casa do alienista. — Vai prendê-lo, pensou ele. E redobraram-lhe as angústias. Com efeito, a tortura moral do boticário naqueles dias de revolução excede a toda a descrição possível. Nunca um homem se achou em mais apertado lance: — a privança do alienista chamava-o ao lado deste, a vitória do barbeiro atraía-o ao barbeiro. Já a simples notícia da sublevação tinha-lhe sacudido fortemente a alma, porque ele sabia a unanimidade do ódio ao alienista; mas a vitória final foi também o golpe final. A esposa, senhora máscula, amiga particular de D. Evarista, dizia que o lugar dele era ao lado de Simão Bacamarte; ao passo que o coração lhe bradava que não, que a causa do alienista estava perdida, e que ninguém, por ato próprio, se amarra a um cadáver. Fê-lo Catão, é verdade, <em>sed victa Catoni</em>, pensava ele, relembrando algumas palestras habituais do Padre Lopes; mas Catão não se atou a uma causa vencida, ele era a própria causa vencida, a causa da república; o seu ato, portanto, foi de egoísta, de um miserável egoísta; minha situação é outra.</p>
            <p>Insistindo, porém, a mulher, não achou Crispim Soares outra saída em tal crise senão adoecer; declarou-se doente e meteu-se na cama.</p>
            <p>—Lá vai o Porfírio à casa do Dr. Bacamarte, disse-lhe a mulher no dia seguinte à cabeceira da cama; vai acompanhado de gente.</p>
            <p>—Vai prendê-lo, pensou o boticário.</p>`,
            
            // Página 2 (global 27)
            `<p>Uma idéia traz outra; o boticário imaginou que, uma vez preso o alienista, viriam também buscá-lo a ele na qualidade de cúmplice. Esta idéia foi o melhor dos vesicatórios. Crispim Soares ergueu-se, disse que estava bom, que ia sair; e, apesar de todos os esforços e protestos da consorte, vestiu-se e saiu. Os velhos cronistas são unânimes em dizer que a certeza de que o marido ia colocar-se nobremente ao lado do alienista consolou grandemente a esposa do boticário; e notam com muita perspicácia o imenso poder moral de uma ilusão; porquanto, o boticário caminhou resolutamente ao palácio do governo e não à casa do alienista. Ali chegando, mostrou-se admirado de não ver o barbeiro, a quem ia apresentar os seus protestos de adesão, não o tendo feito desde a véspera por enfermo. E tossia com algum custo. Os altos funcionários que lhe ouviam esta declaração, sabedores da intimidade do boticário com o alienista, compreenderam toda a importância da adesão nova e trataram a Crispim Soares com apurado carinho; afirmaram-lhe que o barbeiro não tardava; Sua Senhoria tinha ido à Casa Verde, a negócio importante, mas não tardava. Deram-lhe cadeira, refrescos, elogios; disseram-lhe que a causa do ilustre Porfírio era a de todos os patriotas; ao que o boticário ia repetindo que sim, que nunca pensara outra coisa, que isso mesmo mandaria declarar a Sua Majestade.</p>`
        ];

        const startPage = 26;          // Primeira página deste capítulo (global)
        let currentPage = 0;
        const totalPages = pageContents.length;
        let fontSizeIndex = 2;
        const fontSizes = [16, 26, 36, 48, 56];
        
        let rateIndex = 0;
        const rates = [1, 1.3, 1.5];
        
        let utterance = null;
        let speaking = false;

        // DOM
        const pageIndicator = document.getElementById('pageIndicator');
        const pageContent = document.getElementById('pageContent');
        const progressFill = document.getElementById('progressFill');
        const fontMinus = document.getElementById('fontMinusBtn');
        const fontPlus = document.getElementById('fontPlusBtn');
        const rateBtn = document.getElementById('rateBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const speakBtn = document.getElementById('speakBtn');
        const prevBtn = document.getElementById('prevBtnInline');
        const nextBtn = document.getElementById('nextBtnInline');
        const indexWrapper = document.getElementById('indexWrapper');
        const backToIndexBtn = document.getElementById('backToIndexBtn');

        function stopSpeaking() {
            if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
                window.speechSynthesis.cancel();
            }
            speaking = false;
        }

        function speakPage() {
            stopSpeaking();
            const text = pageContent.innerText;
            utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(v => v.lang === 'pt-BR') || voices[0];
            utterance.rate = rates[rateIndex];
            utterance.onend = () => { speaking = false; };
            window.speechSynthesis.speak(utterance);
            speaking = true;
        }

        function updateUI() {
            pageContent.innerHTML = pageContents[currentPage];
            const globalPage = startPage + currentPage;
            pageIndicator.textContent = `Página ${globalPage}`;
            const percent = ((currentPage+1) / totalPages) * 100;
            progressFill.style.width = percent + '%';
            
            if (currentPage === totalPages-1) {
                indexWrapper.style.display = 'block';
            } else {
                indexWrapper.style.display = 'none';
            }
            applyFontSize();
        }

        function applyFontSize() {
            pageContent.style.fontSize = fontSizes[fontSizeIndex] + 'px';
        }

        function goToPage(delta) {
            let newPage = currentPage + delta;
            if (newPage < 0) {
                window.location.href = 'oalienista007.html';
                return;
            }
            if (newPage >= totalPages) {
                window.location.href = 'oalienista009.html';
                return;
            }
            stopSpeaking();
            currentPage = newPage;
            updateUI();
        }

        function cycleRate() {
            rateIndex = (rateIndex + 1) % rates.length;
            const rateValue = rates[rateIndex];
            rateBtn.textContent = rateValue === 1 ? '1x' : (rateValue === 1.3 ? '1.3x' : '1.5x');
            if (speaking) speakPage();
        }

        prevBtn.addEventListener('click', () => goToPage(-1));
        nextBtn.addEventListener('click', () => goToPage(1));
        backToIndexBtn.addEventListener('click', () => { window.location.href = 'indice.html'; });
        fontMinus.addEventListener('click', () => { if (fontSizeIndex > 0) fontSizeIndex--; applyFontSize(); });
        fontPlus.addEventListener('click', () => { if (fontSizeIndex < fontSizes.length-1) fontSizeIndex++; applyFontSize(); });
        fullscreenBtn.addEventListener('click', () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); });
        speakBtn.addEventListener('click', () => { if (speaking) stopSpeaking(); else speakPage(); });
        rateBtn.addEventListener('click', cycleRate);

        cycleRate();
        updateUI();
    })();
</script>
</body>
</html>
